name: Godot Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.1.stable ~/.local/share/godot/export_templates/4.2.1.stable
      
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot -v --export-release "Windows Desktop" build/windows/NeoReversi.exe
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-export
          path: build/windows
